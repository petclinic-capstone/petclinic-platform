apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "petclinic-service.fullname" . }}
  labels:
    {{- include "petclinic-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "petclinic-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "petclinic-service.labels" . | nindent 8 }}
      annotations:
        # Force pod restart when values change even without image tag change
        checksum/values: {{ toJson .Values | sha256sum }}
    spec:
      serviceAccountName: {{ include "petclinic-service.serviceAccountName" . }}

      # -----------------------------------------------------------------------
      # Pod-level security context
      # Enforces: non-root execution, deterministic UID/GID, seccomp baseline
      # -----------------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # -----------------------------------------------------------------------
      # Init containers — enforce Spring Boot startup ordering:
      #   config-server   → no init containers (boots first)
      #   discovery-server → waits for config-server
      #   all others       → wait for config-server then discovery-server
      # Each init container loops on wget until /actuator/health returns UP.
      # busybox:1.36 is used (ARM64 compatible, minimal attack surface).
      # -----------------------------------------------------------------------
      {{- if or .Values.initContainers.waitForConfig .Values.initContainers.waitForDiscovery }}
      initContainers:
        {{- if .Values.initContainers.waitForConfig }}
        - name: wait-for-config-server
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              echo "Waiting for config-server at {{ .Values.initContainers.configServerUrl }} ..."
              until wget -q -O- {{ .Values.initContainers.configServerUrl }}/application/default 2>/dev/null \
                    | grep -q '"name":"application"'; do
                echo "  config-server not ready — retrying in 5s"
                sleep 5
              done
              echo "config-server is UP — proceeding"
        {{- end }}
        {{- if .Values.initContainers.waitForDiscovery }}
        - name: wait-for-discovery-server
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              echo "Waiting for discovery-server at {{ .Values.initContainers.discoveryServerUrl }} ..."
              until wget -q -O- {{ .Values.initContainers.discoveryServerUrl }}/actuator/health 2>/dev/null \
                    | grep -q '"status":"UP"'; do
                echo "  discovery-server not ready — retrying in 5s"
                sleep 5
              done
              echo "discovery-server is UP — proceeding"
        {{- end }}
      {{- end }}

      containers:
        - name: {{ include "petclinic-service.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # -------------------------------------------------------------------
          # Container-level security context
          # -------------------------------------------------------------------
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false  # Spring Boot writes temp files

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # -------------------------------------------------------------------
          # Environment variables
          # -------------------------------------------------------------------
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.springProfiles | quote }}
            - name: SERVER_PORT
              value: {{ .Values.service.targetPort | quote }}

            # -----------------------------------------------------------------
            # DB credentials — injected from ESO-synced Secret petclinic-db-credentials
            # Applies to: customers-service, visits-service, vets-service
            # -----------------------------------------------------------------
            {{- if .Values.secrets.dbCredentials }}
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: password
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: url
            {{- end }}

            # -----------------------------------------------------------------
            # OpenAI API key — injected from ESO-synced Secret openai-api-key
            # Applies to: genai-service
            # -----------------------------------------------------------------
            {{- if .Values.secrets.openaiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: api-key
            {{- end }}

            # -----------------------------------------------------------------
            # Additional per-service env vars (appended from values.env list)
            # -----------------------------------------------------------------
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          # -------------------------------------------------------------------
          # Health probes
          #
          # useSimpleHealth: true  (config-server)
          #   All three probes point to /actuator/health — config-server does
          #   not expose Spring Boot 2.3+ split endpoints at startup.
          #
          # useSimpleHealth: false (all other services)
          #   startupProbe  → /actuator/health          (broad — catches any UP)
          #   readinessProbe → /actuator/health/readiness (removes from LB)
          #   livenessProbe  → /actuator/health/liveness  (triggers restart)
          #
          # startupProbe: 30 failures × 10s period = 5 min grace window
          # This prevents crashLoopBackOff during slow Spring Boot + JVM warmup.
          # -------------------------------------------------------------------
          {{- if .Values.probes.useSimpleHealth }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- else }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      # -----------------------------------------------------------------------
      # Node selector — ARM64 Graviton (t4g.small nodes in petclinic-dev)
      # -----------------------------------------------------------------------
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
