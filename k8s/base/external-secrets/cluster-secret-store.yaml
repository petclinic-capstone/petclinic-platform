# =============================================================================
# cluster-secret-store.yaml — ClusterSecretStore for AWS Secrets Manager
#
# A ClusterSecretStore is cluster-scoped (not namespaced), so ExternalSecret
# CRs in any namespace can reference it. This is the correct choice here
# because petclinic-dev ExternalSecrets and future prod ExternalSecrets all
# share the same AWS provider configuration.
#
# IRSA trust chain:
#   ESO controller pod
#     → ServiceAccount external-secrets-sa (ns: external-secrets)
#     → Annotated with iam_eso_role_arn from TEAM-1 Terraform output
#     → AssumeRoleWithWebIdentity
#     → petclinic-dev-eso-role
#     → GetSecretValue on scoped secret ARNs
#
# TEAM-1 pre-conditions (already satisfied per session-progress.md):
#   ✓ namespace external-secrets created
#   ✓ ServiceAccount external-secrets-sa created
#   ✓ IRSA annotation applied: iam_eso_role_arn
#
# To get the ESO role ARN:
#   terraform -chdir=terraform/environments/dev output -raw iam_eso_role_arn
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: petclinic-secretstore
  labels:
    app.kubernetes.io/managed-by: argocd
    project: petclinic
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            # The ESO controller ServiceAccount annotated with the IRSA role ARN.
            # TEAM-1 created this SA and applied the annotation.
            name: external-secrets-sa
            namespace: external-secrets
