# =============================================================================
# externalsecret-openai.yaml — OpenAI API key → openai-api-key
#
# Source secret: manually created in AWS Secrets Manager by the team.
#
# Secret creation (one-time, before deploying genai-service):
#   aws secretsmanager create-secret \
#     --name petclinic/dev/openai-api-key \
#     --description "OpenAI API key for PetClinic genai-service (dev)" \
#     --secret-string '{"api-key":"sk-proj-YOUR_KEY_HERE"}' \
#     --region us-east-1
#
# Target secret: openai-api-key (namespace: petclinic-dev)
#   Keys produced:
#     api-key — injected as OPENAI_API_KEY env var in genai-service
#
# Consumed by (deployment.yaml secretKeyRef):
#   genai-service only
#
# The ESO IAM role (petclinic-dev-eso-role) already has GetSecretValue
# permission scoped to this secret path (configured in TEAM-1 Terraform).
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openai-api-key
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/managed-by: argocd
    project: petclinic
    environment: dev
spec:
  # Refresh every hour. Rotate the AWS secret to rotate without pod restart.
  refreshInterval: 1h

  secretStoreRef:
    name: petclinic-secretstore
    kind: ClusterSecretStore

  target:
    name: openai-api-key
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: api-key          # Key name in the resulting K8s Secret
      remoteRef:
        key: petclinic/dev/openai-api-key   # Secrets Manager secret name
        property: api-key                   # JSON field inside the secret value
