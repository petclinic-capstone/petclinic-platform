# =============================================================================
# externalsecret-db.yaml — RDS MySQL credentials → petclinic-db-credentials
#
# Source secret: AWS RDS managed master user password (auto-rotated by RDS).
#   Created automatically when manage_master_user_password = true in the RDS
#   Terraform module. The ARN is exposed as Terraform output rds_secret_arn.
#
# To retrieve the secret ARN for the remoteRef key below:
#   terraform -chdir=terraform/environments/dev output -raw rds_secret_arn
#
# Target secret: petclinic-db-credentials (namespace: petclinic-dev)
#   Keys produced:
#     username — Spring datasource username
#     password — Spring datasource password
#     url      — Full JDBC URL constructed from RDS secret fields via template
#
# Consumed by (deployment.yaml secretKeyRef):
#   customers-service, visits-service, vets-service
#
# The ESO template engine (v2) renders the JDBC URL from the raw RDS secret
# JSON fields. This avoids storing the endpoint in a separate ConfigMap and
# keeps all connection details in a single ESO-managed Secret.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: petclinic-db-credentials
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/managed-by: argocd
    project: petclinic
    environment: dev
spec:
  # Refresh from Secrets Manager every hour.
  # RDS auto-rotation will be picked up within the next refresh cycle.
  refreshInterval: 1h

  secretStoreRef:
    name: petclinic-secretstore
    kind: ClusterSecretStore

  target:
    name: petclinic-db-credentials
    # Owner: ESO owns this Secret — it will be deleted if the ExternalSecret is deleted.
    creationPolicy: Owner
    # Retain: keep the Secret if the ExternalSecret is deleted (safety for prod-parity dev).
    deletionPolicy: Retain

    template:
      engineVersion: v2
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        # AWS RDS managed secret only stores username and password.
        # Host, port, and dbname are non-sensitive and hardcoded from Terraform outputs.
        # rds_endpoint = petclinic-dev-mysql.cydgw0gco25a.us-east-1.rds.amazonaws.com
        url: "jdbc:mysql://petclinic-dev-mysql.cydgw0gco25a.us-east-1.rds.amazonaws.com:3306/petclinic?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true"

  # Pull the entire RDS managed secret JSON and expose all fields as template variables.
  # IMPORTANT: Replace the key value below with the actual RDS secret ARN from:
  #   terraform -chdir=terraform/environments/dev output -raw rds_secret_arn
  #
  # The ARN format is:
  #   arn:aws:secretsmanager:us-east-1:482352877891:secret:rds!db-petclinic-dev-mysql-<suffix>
  dataFrom:
    - extract:
        key: arn:aws:secretsmanager:us-east-1:482352877891:secret:rds!db-3005c2e4-2025-4d99-b054-23cb3b01e22d-w4una3
        # conversionStrategy: Default — no key transformation needed
        # decodingStrategy: None — values are plain strings in the RDS JSON
