# =============================================================================
# externalsecret-claude.yaml — Anthropic Claude API key → claude-api-key
#
# Source secret: manually created in AWS Secrets Manager.
#   aws secretsmanager create-secret \
#     --name petclinic/dev/claude-api-key \
#     --secret-string '{"api-key":"sk-ant-YOUR_KEY_HERE"}' \
#     --region us-east-1
#
# Target secret: claude-api-key (namespace: petclinic-dev)
#   Keys produced:
#     api-key — injected as ANTHROPIC_API_KEY in the LiteLLM proxy pod
#
# Flow: genai-service → LiteLLM (http://litellm:4000) → Anthropic Claude API
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-api-key
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/managed-by: argocd
    project: petclinic
    environment: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: petclinic-secretstore
    kind: ClusterSecretStore
  target:
    name: claude-api-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-key
      remoteRef:
        key: petclinic/dev/claude-api-key
        property: api-key
