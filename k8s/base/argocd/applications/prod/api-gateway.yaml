apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic-prod-api-gateway
  namespace: argocd
  labels:
    project: petclinic
    environment: prod
    service: api-gateway
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: petclinic
  source:
    repoURL: https://github.com/petclinic-capstone/petclinic-platform.git
    targetRevision: HEAD
    path: helm/petclinic-service
    helm:
      releaseName: api-gateway
      valueFiles:
        - ../../helm-values/api-gateway.yaml
        - ../../helm-values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
