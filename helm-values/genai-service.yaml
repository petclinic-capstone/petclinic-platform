# =============================================================================
# genai-service — AI-powered veterinary assistant (Spring AI + OpenAI)
# Port  : 8084
# Secret: openai-api-key (ESO-synced from Secrets Manager)
#         Injected as OPENAI_API_KEY environment variable.
# Init  : Full startup ordering — waits for config + discovery.
# Note  : No DB access; reads from vets-service / visits-service via Eureka.
# =============================================================================

service:
  name: genai-service
  port: 8084
  targetPort: 8084
image:
  repository: 482352877891.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/genai-service
  tag: "6dc934e" # overridden by CI pipeline with SHA-7
initContainers:
  waitForConfig: true
  waitForDiscovery: true
probes:
  useSimpleHealth: false
secrets:
  dbCredentials: false
  openaiKey: true # OPENAI_API_KEY injected from ESO-synced Secret
springProfiles: "docker,kubernetes"
# LiteLLM proxy — routes Spring AI OpenAI calls to Anthropic Claude
env:
  - name: SPRING_AI_OPENAI_BASE_URL
    value: "http://litellm:4000"
  - name: OPENAI_API_KEY
    value: "sk-litellm-petclinic"
