# =============================================================================
# customers-service — Manages pet owner / customer records
# Port  : 8081
# DB    : Reads/writes petclinic MySQL schema (RDS via IRSA + ESO)
# Init  : Full startup ordering — waits for config + discovery.
# Secret: petclinic-db-credentials (ESO-synced from Secrets Manager)
# =============================================================================

service:
  name: customers-service
  port: 8081
  targetPort: 8081
image:
  repository: 482352877891.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/customers-service
  tag: "6dc934e" # overridden by CI pipeline with SHA-7
initContainers:
  waitForConfig: true
  waitForDiscovery: true
probes:
  useSimpleHealth: false
# Injects SPRING_DATASOURCE_USERNAME / PASSWORD / URL from ESO-synced secret
secrets:
  dbCredentials: true
  openaiKey: false
springProfiles: "docker,kubernetes"
# Schema initialisation — activates MySQL scripts already bundled in the JAR
# Spring Boot defaults to mode=embedded (skips non-embedded DBs). Setting
# mode=always forces schema + data SQL to run against RDS on startup.
# CREATE TABLE IF NOT EXISTS makes this idempotent.
env:
  - name: SPRING_SQL_INIT_MODE
    value: "always"
  - name: SPRING_SQL_INIT_SCHEMA_LOCATIONS
    value: "classpath*:db/mysql/schema.sql"
  - name: SPRING_SQL_INIT_DATA_LOCATIONS
    value: "classpath*:db/mysql/data.sql"
