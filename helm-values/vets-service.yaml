# =============================================================================
# vets-service — Manages veterinarian records and specialties
# Port  : 8083
# DB    : Reads/writes petclinic MySQL schema (RDS via IRSA + ESO)
# Init  : Full startup ordering — waits for config + discovery.
# Secret: petclinic-db-credentials (ESO-synced from Secrets Manager)
# =============================================================================

service:
  name: vets-service
  port: 8083
  targetPort: 8083

image:
  repository: 482352877891.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/vets-service
  tag: "latest"   # overridden by CI pipeline with SHA-7

initContainers:
  waitForConfig: true
  waitForDiscovery: true

probes:
  useSimpleHealth: false

secrets:
  dbCredentials: true
  openaiKey: false

springProfiles: "docker,kubernetes"
